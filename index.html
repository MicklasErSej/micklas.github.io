<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Hub</title>
<style>
    /* Reset & Base */
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        text-align: center;
        background: #f0f2f5;
        color: #333;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding: 20px;
    }

    h1, h2 {
        margin-bottom: 20px;
    }

    /* Game Screens */
    .game-screen {
        display: none;
        width: 100%;
        max-width: 900px;
        margin: 0 auto;
        padding: 20px;
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        position: relative;
    }

    /* Hub Buttons */
    #mainMenu button {
        width: 250px;
        margin: 10px auto;
        font-size: 22px;
        padding: 15px 0;
        border-radius: 12px;
        background-color: #4CAF50;
        color: #fff;
        transition: 0.3s;
    }

    #mainMenu button:hover {
        background-color: #45a049;
    }

    /* RNG Number Display */
    #number {
        font-size: 4vw;
        min-height: 100px;
        font-weight: bold;
        background-color: #fff;
        padding: 30px 0;
        border-radius: 15px;
        margin: 20px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    /* Generate Button */
    #generateButton {
        font-size: 1.8rem;
        padding: 15px 30px;
        margin: 20px 0;
        border-radius: 12px;
        background-color: #FFA500;
        color: #fff;
    }

    #generateButton:hover {
        background-color: #e69500;
    }

    /* Sliders */
    .sliders {
        display: flex;
        flex-direction: column;
        gap: 15px;
        background: #fefefe;
        padding: 20px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        width: 100%;
    }

    .sliders p {
        font-weight: bold;
    }

    .sliders input[type="range"] {
        width: 100%;
    }

    /* Cash Register Buttons */
    #game2 div.money-buttons {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 10px;
        margin: 20px 0;
    }

    #game2 div.money-buttons button {
        font-size: 1rem;
        padding: 10px;
        border-radius: 10px;
        background: #4CAF50;
        color: #fff;
        transition: 0.3s;
    }

    #game2 div.money-buttons button:hover {
        background: #45a049;
    }

    /* Action buttons */
    #game2 div.actions {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
        margin: 20px 0;
    }

    #game2 div.actions button {
        padding: 15px 25px;
        font-size: 1.2rem;
        border-radius: 12px;
        color: #fff;
        cursor: pointer;
        border: none;
    }

    #game2 div.actions button.check {
        background-color: #FFA500;
    }

    #game2 div.actions button.check:hover {
        background-color: #e69500;
    }

    #game2 div.actions button.reset {
        background-color: #FF6347;
    }

    #game2 div.actions button.reset:hover {
        background-color: #e55b3c;
    }

    /* Back button */
    .game-screen button.back {
        position: absolute;
        top: 15px;
        right: 15px;
        padding: 8px 15px;
        font-size: 1rem;
        border-radius: 10px;
        background-color: #333;
        color: #fff;
        border: none;
        cursor: pointer;
    }

    .game-screen button.back:hover {
        background-color: #555;
    }

    /* Target & Total */
    #targetNumber {
        font-size: 2.5rem;
        font-weight: bold;
        color: #2E8B57;
        margin: 15px 0;
    }

    #currentTotal {
        font-size: 2rem;
        font-weight: bold;
        color: #1E90FF;
        margin: 15px 0;
    }

    #resultText {
        font-size: 1.5rem;
        font-weight: bold;
        margin: 10px 0;
    }

    /* History Panel */
    #historyPanel {
        display: none;
        position: absolute;
        top: 60px;
        left: 20px;
        width: 250px;
        max-height: 300px;
        overflow-y: auto;
        background: #fff;
        border: 2px solid #4CAF50;
        border-radius: 10px;
        padding: 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #historyPanel h3 {
        margin: 0;
        padding: 10px;
        background: #4CAF50;
        color: #fff;
        font-size: 18px;
        text-align: center;
        position: sticky;
        top: 0;
        z-index: 1;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
    }

    #historyList {
        list-style: none;
        padding: 10px;
        margin: 0;
        max-height: 240px;
        overflow-y: auto;
    }

    #historyList li {
        padding: 5px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    #historyList li.correct::before {
        content: "✔️";
        margin-right: 5px;
        color: green;
    }

    #historyList li.wrong::before {
        content: "❌";
        margin-right: 5px;
        color: red;
    }

    /* History Button */
    #historyButton {
        position: absolute;
        top: 15px;
        left: 15px;
        padding: 8px 15px;
        border-radius: 10px;
        background-color: #4CAF50;
        color: #fff;
        border: none;
        cursor: pointer;
        font-size: 1rem;
    }

    #historyButton:hover {
        background-color: #45a049;
    }

    /* Responsive text sizes */
    @media (max-width: 600px) {
        #number {
            font-size: 8vw;
        }

        #targetNumber {
            font-size: 2rem;
        }

        #currentTotal {
            font-size: 1.5rem;
        }

        #game2 div.money-buttons button {
            font-size: 0.9rem;
            padding: 8px;
        }

        #game2 div.actions button {
            font-size: 1rem;
            padding: 10px 20px;
        }
    }
</style>
</head>
<body>

<div id="menuWrapper" style="transition: opacity 0.5s;">
    <h1>Game Hub 🎮</h1>
    <!-- Main Menu -->
    <div id="mainMenu">
        <button onclick="showGame('rng')">Random Number Generator</button>
        <button onclick="showGame('game2')">Game 2 (Coming Soon)</button>
    </div>
</div>

<!-- Random Number Generator Game -->
<div id="rng" class="game-screen" style="position: relative;">
    <h2>Random Number Generator 🎲</h2>

    <!-- Number Display -->
    <div id="numberWrapper" style="margin-bottom: 30px;">
        <div id="number">0</div>
    </div>

    <!-- Button + Sliders Side by Side -->
    <div id="rngControls" style="display: flex; justify-content: center; align-items: flex-start; gap: 50px; margin-top: 30px;">

        <!-- Generate Button Wrapper -->
        <div id="generateButtonWrapper" style="margin-top: 0;">
            <button id="generateButton" onclick="generateNumber()"style=> Generate Number</button>
        </div>

        <!-- Sliders Wrapper -->
        <div class="sliders" style="margin-top: 0; width: 1000px;">
            <p>1–100: <span id="p1Text">50</span>%</p>
            <input type="range" id="p1" min="0" max="100" value="50">

            <p>101–699: <span id="p2Text">40</span>%</p>
            <input type="range" id="p2" min="0" max="100" value="40">

            <p>700–1000: <span id="p3Text">10</span>%</p>
            <input type="range" id="p3" min="0" max="100" value="10">
        </div>
    </div>

    <!-- Back Button Wrapper -->
    <div id="backButtonWrapper" style="margin-top: 40px;">
        <button onclick="backToMenu()" style="position:absolute; top:-12px; right:0px; padding:10px 17px;">Back to Menu</button>
    </div>
</div>

<!-- Game 2: Cash Register Trainer -->
<div id="game2" class="game-screen" style="position: relative;">
    <h2>Cash Register Trainer 💰</h2>

    <!-- Target Number -->
    <div id="targetNumber" style="font-size:50px; font-weight:bold; margin:20px; color:#2E8B57;">
        0
    </div>

    <!-- Current Total -->
    <div id="currentTotal" style="font-size:36px; font-weight:bold; margin:20px; color:#1E90FF;">
        Total: 0
    </div>

    <!-- Level Selection -->
    <div style="margin-bottom:20px;">
        <label for="levelSelect"><b>Select Level:</b></label>
        <select id="levelSelect" onchange="setLevel()" style="font-size:22px; padding:5px 10px;">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>

    <!-- Money Buttons Grid -->
    <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; max-width:600px; margin:20px auto;">
        <button onclick="addValue(0.5)">0,50 kr</button>
        <button onclick="addValue(1)">1 kr</button>
        <button onclick="addValue(2)">2 kr</button>
        <button onclick="addValue(5)">5 kr</button>
        <button onclick="addValue(10)">10 kr</button>
        <button onclick="addValue(20)">20 kr</button>
        <button onclick="addValue(50)">50 kr</button>
        <button onclick="addValue(100)">100 kr</button>
        <button onclick="addValue(200)">200 kr</button>
        <button onclick="addValue(500)">500 kr</button>
    </div>

     <!-- History Buttom -->
    
    <button id="historyButton" onclick="toggleHistory()" 
        style="position:absolute; bottom:-543px; Left:0px;">History</button>

    <!-- History Panel -->
<div id="historyPanel" 
     style="display:none; 
            position:absolute; top:60px; right:20px; 
            width:250px; height:300px;  /* fixed height */
            background:#fff; border:2px solid #4CAF50; border-radius:10px; 
            padding:0; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">

    <!-- Sticky Header -->
    <h3 style="
            margin:0; padding:10px; 
            background:#4CAF50; color:#fff; 
            font-size:18px; text-align:center; 
            position:sticky; top:0; z-index:1;
            border-top-left-radius:8px; border-top-right-radius:8px;">
        History
    </h3>

    <!-- Scrollable List -->
    <ul id="historyList" style="
            list-style:none; padding:10px; margin:0; 
            max-height:240px; overflow-y:auto;">
    </ul>
</div>

    <!-- Actions -->
    <div style="margin:20px;">
        <button onclick="checkAnswer()" style="padding:15px 30px; font-size:24px; background-color:#FFA500;">Check</button>
        <button onclick="resetTotal()" style="padding:15px 30px; font-size:24px; background-color:#FF6347;">Reset</button>
    </div>

    <!-- Result Text -->
    <p id="resultText" style="font-size:30px; font-weight:bold; color:#FF4500;"></p>

    <!-- Back Button -->
    <button onclick="backToMenu()" style="position:absolute; top:-12px; right:0px; padding:10px 17px;">Back to Menu</button>
</div>

<script>
function showGame(gameId){
    const menu = document.getElementById('menuWrapper');

    menu.style.opacity = 0;

    setTimeout(() => {
        menu.style.display = 'none';
        document.querySelectorAll('.game-screen').forEach(div => div.style.display = 'none');
        document.getElementById(gameId).style.display = 'block';

        // 👇 ADD THIS PART
        if (gameId === "game2") {
            startGame2();
        }

    }, 500);
}

function backToMenu(){
    const menu = document.getElementById('menuWrapper');
    // Show menu first, but invisible
    menu.style.display = 'block';
    menu.style.opacity = 0;

    document.querySelectorAll('.game-screen').forEach(div => div.style.display = 'none');

    // Fade in
    setTimeout(() => {
        menu.style.opacity = 1;
    }, 10); // tiny delay to trigger transition
}

// Random Number Generator    JS 
const p1Slider = document.getElementById("p1");
const p2Slider = document.getElementById("p2");
const p3Slider = document.getElementById("p3");

const p1Text = document.getElementById("p1Text");
const p2Text = document.getElementById("p2Text");
const p3Text = document.getElementById("p3Text");

// Update the slider text
function updateDisplay() {
    p1Text.innerText = p1Slider.value;
    p2Text.innerText = p2Slider.value;
    p3Text.innerText = p3Slider.value;
}

// Normalize sliders so total is always 100%
function normalizeSliders(changed) {
    let total = parseInt(p1Slider.value) + parseInt(p2Slider.value) + parseInt(p3Slider.value);

    if (total > 100) {
        let excess = total - 100;

        if (changed === p1Slider) {
            p2Slider.value = Math.max(0, parseInt(p2Slider.value) - Math.round(excess * (parseInt(p2Slider.value)/(parseInt(p2Slider.value)+parseInt(p3Slider.value)))));
            p3Slider.value = Math.max(0, parseInt(p3Slider.value) - Math.round(excess * (parseInt(p3Slider.value)/(parseInt(p2Slider.value)+parseInt(p3Slider.value)))));
        } else if (changed === p2Slider) {
            p1Slider.value = Math.max(0, parseInt(p1Slider.value) - Math.round(excess * (parseInt(p1Slider.value)/(parseInt(p1Slider.value)+parseInt(p3Slider.value)))));
            p3Slider.value = Math.max(0, parseInt(p3Slider.value) - Math.round(excess * (parseInt(p3Slider.value)/(parseInt(p1Slider.value)+parseInt(p3Slider.value)))));
        } else if (changed === p3Slider) {
            p1Slider.value = Math.max(0, parseInt(p1Slider.value) - Math.round(excess * (parseInt(p1Slider.value)/(parseInt(p1Slider.value)+parseInt(p2Slider.value)))));
            p2Slider.value = Math.max(0, parseInt(p2Slider.value) - Math.round(excess * (parseInt(p2Slider.value)/(parseInt(p1Slider.value)+parseInt(p2Slider.value)))));
        }
    }

    updateDisplay();
}

// Connect sliders
[p1Slider, p2Slider, p3Slider].forEach(slider => {
    slider.oninput = () => normalizeSliders(slider);
});

// Generate number function
function generateNumber() {
    let p1 = p1Slider.value / 100;
    let p2 = p2Slider.value / 100;
    let p3 = p3Slider.value / 100;

    let random = Math.random();
    let number;

    if (random < p1) {
        number = Math.floor(Math.random() * 100) + 1;
    } else if (random < p1 + p2) {
        number = Math.floor(Math.random() * 599) + 101;
    } else {
        number = Math.floor(Math.random() * 301) + 700;
    }

    document.getElementById("number").innerText = number;
}


//Game 2
    
let level = "easy";

let levelSettings = {
    easy:   { p1: 0.7, p2: 0.25, p3: 0.05 },
    medium: { p1: 0.4, p2: 0.4,  p3: 0.2 },
    hard:   { p1: 0.2, p2: 0.5,  p3: 0.3 }
};

function setLevel() {
    level = document.getElementById("levelSelect").value;
    startGame2(); // restart with new difficulty
}
    
let target = 0;
let total = 0;

// Start new round
function startGame2() {
    total = 0;

     // Clear previous result message
    document.getElementById("resultText").innerText = "";

    if (level === "easy") {
        target = Math.floor(Math.random() * 100) + 1;
    } else if (level === "medium") {
        target = Math.floor(Math.random() * 200) + 101;
    } else if (level === "hard") {
        target = Math.floor(Math.random() * 200) + 301;
    }

     // 50% chance to add .50
    if (Math.random() < 0.05) target += 0.5;

    document.getElementById("targetNumber").innerText = formatDKK(target);
    document.getElementById("currentTotal").innerText = "Total: " + formatDKK(total);
}

// Add money
function addValue(value) {
    total += value;
    document.getElementById("currentTotal").innerText = "Total: " + formatDKK(total);
}

// Reset
function resetTotal() {
    total = 0;
    document.getElementById("currentTotal").innerText = "Total: 0";
}

// Check answer
function checkAnswer() {
    // Store attempt in history
    updateHistory(target, total);

    if (Math.abs(total - target) < 0.01) {
        document.getElementById("resultText").innerText = "✅ Correct!";
        setTimeout(startGame2, 1000); // new round after 1 sec
    } else {
        document.getElementById("resultText").innerText = "❌ Try again!";
    }
}
function formatDKK(value) {
    return value.toFixed(2).replace(".", ",") + " kr";
}

// History Array
let history = [];

// Toggle History Panel
function toggleHistory() {
    const panel = document.getElementById("historyPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

// Update history
function updateHistory(target, entered) {
    history.push({ target: target, entered: entered });
    const list = document.getElementById("historyList");
    list.innerHTML = ""; // Clear current list

    // Show newest first
    history.slice().reverse().forEach(item => {
        const li = document.createElement("li");

        // Check if correct
        const correct = Math.abs(item.entered - item.target) < 0.01;
        const icon = correct ? "✅" : "❌";

        li.innerText = `${icon} Target: ${formatDKK(item.target)}, Entered: ${formatDKK(item.entered)}`;
        list.appendChild(li);
    });
}

// Initialize display
updateDisplay();
</script>

</body>
</html>
