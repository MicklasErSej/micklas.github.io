<script>
function generateNumber() {
    let random = Math.random();
    let number;

    if (random < 0.7) {
        number = Math.floor(Math.random() * 400) + 1;
    } else {
        number = Math.floor(Math.random() * 600) + 401;
    }

    document.getElementById("number").innerText = number;
}
</script>
