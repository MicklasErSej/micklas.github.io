<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Menuen</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f4f4f4;
        margin: 50px;
    }

    h1 {
        margin-bottom: 40px;
    }

    .game-screen {
        display: none;
    }

    #number {
        font-size: 80px;
        font-weight: bold;
        background-color: #fff;
        padding: 40px 0;
        border-radius: 15px;
        margin-top: 45px;
        margin-bottom: 30px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    #generateButton {
        position: absolute;
        top: 315px;
        margin: 0;
        justify-self: anchor-center;
        font-size: 55px;
    }

    button {
        padding: 20px 40px;
        font-family: Arial, sans-serif;
        font-size: 30px;
        border: none;
        border-radius: 10px;
        background-color: #000000;
        color: white;
        cursor: pointer;
        transition: background-color 0.3s;
    }

    button:hover {
        background-color: #3d3d3d;
    }

    .sliders {
        background-color: #fff;
        display: inline-block;
        padding: 20px 30px;
        border-radius: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        text-align: left;
        position: absolute;
        top: 900px;
        margin: 0;
    }

    .sliders p {
        margin: 15px 0 5px;
        font-weight: bold;
    }

    .sliders input[type="range"] {
        width: 100%;
    }
</style>
</head>
<body>

<div id="menuWrapper" style="transition: opacity 0.5s;">
    <h1>Menuen</h1>
    <!-- Main Menu -->
    <div id="mainMenu">
        <button onclick="showGame('rng')">Tallene</button>
        <button onclick="showGame('game2')">Penge Tilbage</button>
        <button onclick="showGame('sayNumber')">Sig Talet</button>
    </div>
</div>

<!-- Random Number Generator Game -->
<div id="rng" class="game-screen" style="position: relative;">
    <h2>Tallene</h2>

    <!-- Number Display -->
    <div id="numberWrapper" style="margin-bottom: 30px;">
        <div id="number">0</div>
    </div>

    <!-- Button + Sliders Side by Side -->
    <div id="rngControls" style="display: flex; justify-content: center; align-items: flex-start; gap: 50px; margin-top: 30px;">

        <!-- Generate Button Wrapper -->
        <div id="generateButtonWrapper" style="margin-top: 0;">
            <button id="generateButton" onclick="generateNumber()"style=>Generere Tal</button>
        </div>

        <!-- Sliders Wrapper -->
        <div class="sliders" style="margin-top: 0; width: 1000px;">
            <p>1–100: <span id="p1Text">50</span>%</p>
            <input type="range" id="p1" min="0" max="100" value="50">

            <p>101–699: <span id="p2Text">40</span>%</p>
            <input type="range" id="p2" min="0" max="100" value="40">

            <p>700–1000: <span id="p3Text">10</span>%</p>
            <input type="range" id="p3" min="0" max="100" value="10">
        </div>
    </div>

    <!-- Back Button Wrapper -->
    <div id="backButtonWrapper" style="margin-top: 40px;">
        <button onclick="backToMenu()" style="position:absolute; top:-12px; right:0px; padding:10px 17px;">Tilbage Til Menuen</button>
    </div>
</div>

<!-- Game 2: Cash Register Trainer -->
<div id="game2" class="game-screen" style="position: relative;">
    <h2>Penge Tilbage</h2>

    <!-- Target Number -->
    <div id="targetNumber" style="font-size:82px; font-weight:bold; margin:20px; color:#2E8B57;">
        0
    </div>

    <!-- Current Total -->
    <div id="currentTotal" style="font-size:50px; font-weight:bold; margin:20px; color:#1E90FF;">
        Total: 0
    </div>

    <!-- Level Selection -->
    <div style="margin-bottom:20px;">
        <label for="levelSelect"><b>Vælg Level:</b></label>
        <select id="levelSelect" onchange="setLevel()" style="font-size:22px; padding:5px 10px;">
            <option value="easy">Nem</option>
            <option value="medium">Mellem</option>
            <option value="hard">Svær</option>
        </select>
    </div>

    <!-- Money Buttons Grid -->
    <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; max-width:600px; margin:20px auto;">
        <button onclick="addValue(0.5)">0,50 kr</button>
        <button onclick="addValue(1)">1 kr</button>
        <button onclick="addValue(2)">2 kr</button>
        <button onclick="addValue(5)">5 kr</button>
        <button onclick="addValue(10)">10 kr</button>
        <button onclick="addValue(20)">20 kr</button>
        <button onclick="addValue(50)">50 kr</button>
        <button onclick="addValue(100)">100 kr</button>
        <button onclick="addValue(200)">200 kr</button>
        <button onclick="addValue(500)">500 kr</button>
    </div>

    <!-- History Button -->
<button id="historyButton" onclick="toggleHistory()" 
    style="position:absolute; top:-12px; left:0px; padding:10px 17px; z-index:2;">
    History
</button>

<!-- History Panel -->
<div id="historyPanel" 
     style="display:none; 
            position:absolute; top:60px; left:0px; 
            width:315px; height:300px;  /* fixed height */
            background:#fff; border:2px solid #000000; border-radius:10px; 
            padding:0; box-shadow: 0 4px 10px rgba(0,0,0,0.2); z-index:2;">

    <!-- Sticky Header -->
    <div style="
            display:flex; justify-content:space-between; align-items:center;
            margin:0; padding:10px; 
            background:#000000; color:#fff; 
            font-size:18px; font-weight:bold; text-align:center; 
            position:sticky; top:0; z-index:1;
            border-top-left-radius:8px; border-top-right-radius:8px;">
        <span>History</span>
        <button id="clearHistoryButton" style="
            background:#FF6347; color:#fff; border:none; 
            border-radius:5px; padding:2px 6px; cursor:pointer; font-size:17px;">
            Clear
        </button>
    </div>

    <!-- Scrollable List -->
    <ul id="historyList" style="
            list-style:none; padding:10px; margin:0; 
            max-height:240px; overflow-y:auto;">
    </ul>
</div>

    <!-- Actions -->
    <div style="margin:20px; margin-top: 20px">
        <button onclick="checkAnswer()" style="padding:15px 30px; font-size:24px; background-color:#2E8B57;">Tjek</button>
        <button onclick="resetTotal()" style="padding:15px 30px; font-size:24px; background-color:#FF6347;">Nulstil</button>
    </div>

    <!-- Result Text -->
    <p id="resultText" style="font-size:30px; font-weight:bold; color:#FF4500;"></p>

    <!-- Score Board -->
    <div id="scoreBoard" style="font-size:20px; margin:10px; position: fixed; left: 20px; bottom: 20px; background:#fff; padding:10px 15px; border-radius:10px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
        Score: <span id="score">0</span> |
    🔥 Session: <span id="sessionBest">0</span>
</div>

<!-- All-time score (separate box) -->
<div id="allTimeBox" style="
    bottom:20px;
    right:20px;
    font-size:20px;
    background:#fff;
    padding:10px 15px;
    border-radius:10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    position: fixed;
">
    🏆 All-time: <span id="allTimeBest">0</span>
</div>

    <!-- Back Button -->
    <button onclick="backToMenu()" style="position:absolute; top:-12px; right:0px; padding:10px 17px;">Tilbage Til Menuen</button>
</div>

<!-- Game 3 -->
<div id="sayNumber" class="game-screen" style="position: relative; padding:20px;">
    <h2>Sig Talet</h2>

     <!-- Number display -->
    <div id="sayNumberDisplay" style="
        font-size:80px; font-weight:bold; color:#2E8B57; 
        background:#fff; padding:40px; border-radius:15px; margin:30px auto; 
        max-width:300px; box-shadow:0 4px 10px rgba(0,0,0,0.1);
    ">0</div>

    <!-- Microphone button -->
    <button id="startMicBtn" style="
        padding:15px 30px; font-size:24px; background-color:#1E90FF; color:white;
        border:none; border-radius:10px; cursor:pointer;
    ">Start Listening</button>

    <!-- Feedback -->
    <p id="sayNumberResult" style="font-size:30px; font-weight:bold; margin-top:20px;"></p>

    <!-- Streak counter -->
    <p style="font-size:24px;">🔥 Streak: <span id="sayNumberStreak">0</span></p>

    <!-- Back button -->
    <button onclick="backToMenu()" style="
        position:absolute; top:10px; right:10px; padding:10px 17px;
    ">Tilbage Til Menuen</button>
</div>

<script>
function showGame(gameId){
    const menu = document.getElementById('menuWrapper');

    menu.style.opacity = 0;

    setTimeout(() => {
        menu.style.display = 'none';
        document.querySelectorAll('.game-screen').forEach(div => div.style.display = 'none');
        document.getElementById(gameId).style.display = 'block';

        // 👇 ADD THIS PART
        if (gameId === "game2") {
            startGame2();
        }

    }, 500);
}

function backToMenu(){
    const menu = document.getElementById('menuWrapper');
    // Show menu first, but invisible
    menu.style.display = 'block';
    menu.style.opacity = 0;

    document.querySelectorAll('.game-screen').forEach(div => div.style.display = 'none');

    // Fade in
    setTimeout(() => {
        menu.style.opacity = 1;
    }, 10); // tiny delay to trigger transition
}

// Random Number Generator    JS 
const p1Slider = document.getElementById("p1");
const p2Slider = document.getElementById("p2");
const p3Slider = document.getElementById("p3");

const p1Text = document.getElementById("p1Text");
const p2Text = document.getElementById("p2Text");
const p3Text = document.getElementById("p3Text");

// Update the slider text
function updateDisplay() {
    p1Text.innerText = p1Slider.value;
    p2Text.innerText = p2Slider.value;
    p3Text.innerText = p3Slider.value;
}

// Normalize sliders so total is always 100%
function normalizeSliders(changed) {
    let total = parseInt(p1Slider.value) + parseInt(p2Slider.value) + parseInt(p3Slider.value);

    if (total > 100) {
        let excess = total - 100;

        if (changed === p1Slider) {
            p2Slider.value = Math.max(0, parseInt(p2Slider.value) - Math.round(excess * (parseInt(p2Slider.value)/(parseInt(p2Slider.value)+parseInt(p3Slider.value)))));
            p3Slider.value = Math.max(0, parseInt(p3Slider.value) - Math.round(excess * (parseInt(p3Slider.value)/(parseInt(p2Slider.value)+parseInt(p3Slider.value)))));
        } else if (changed === p2Slider) {
            p1Slider.value = Math.max(0, parseInt(p1Slider.value) - Math.round(excess * (parseInt(p1Slider.value)/(parseInt(p1Slider.value)+parseInt(p3Slider.value)))));
            p3Slider.value = Math.max(0, parseInt(p3Slider.value) - Math.round(excess * (parseInt(p3Slider.value)/(parseInt(p1Slider.value)+parseInt(p3Slider.value)))));
        } else if (changed === p3Slider) {
            p1Slider.value = Math.max(0, parseInt(p1Slider.value) - Math.round(excess * (parseInt(p1Slider.value)/(parseInt(p1Slider.value)+parseInt(p2Slider.value)))));
            p2Slider.value = Math.max(0, parseInt(p2Slider.value) - Math.round(excess * (parseInt(p2Slider.value)/(parseInt(p1Slider.value)+parseInt(p2Slider.value)))));
        }
    }

    updateDisplay();
}

// Connect sliders
[p1Slider, p2Slider, p3Slider].forEach(slider => {
    slider.oninput = () => normalizeSliders(slider);
});

// Generate number function
function generateNumber() {
    let p1 = p1Slider.value / 100;
    let p2 = p2Slider.value / 100;
    let p3 = p3Slider.value / 100;

    let random = Math.random();
    let number;

    if (random < p1) {
        number = Math.floor(Math.random() * 100) + 1;
    } else if (random < p1 + p2) {
        number = Math.floor(Math.random() * 599) + 101;
    } else {
        number = Math.floor(Math.random() * 301) + 700;
    }

    document.getElementById("number").innerText = number;
}


//Game 2
    
let level = "easy";

let levelSettings = {
    easy:   { p1: 0.7, p2: 0.25, p3: 0.05 },
    medium: { p1: 0.4, p2: 0.4,  p3: 0.2 },
    hard:   { p1: 0.2, p2: 0.5,  p3: 0.3 }
};

function setLevel() {
    level = document.getElementById("levelSelect").value;
    startGame2(); // restart with new difficulty
}
    
let target = 0;
let total = 0;
let score = 0;
let streak = 0;

// Session best (resets)
let sessionBest = 0;

// All-time best (saved)
let allTimeBest = localStorage.getItem("bestStreak") 
    ? parseInt(localStorage.getItem("bestStreak")) 
    : 0;

// Start new round
function startGame2() {
    total = 0;

     // Clear previous result message
    document.getElementById("resultText").innerText = "";

    if (level === "easy") {
        target = Math.floor(Math.random() * 100) + 1;
    } else if (level === "medium") {
        target = Math.floor(Math.random() * 200) + 101;
    } else if (level === "hard") {
        target = Math.floor(Math.random() * 200) + 301;
    }

     // 50% chance to add .50
    if (Math.random() < 0.05) target += 0.5;

    document.getElementById("targetNumber").innerText = formatDKK(target);
    document.getElementById("currentTotal").innerText = "Total: " + formatDKK(total);
}

// Add money
function addValue(value) {
    total += value;
    document.getElementById("currentTotal").innerText = "Total: " + formatDKK(total);
}

// Reset
function resetTotal() {
    total = 0;
    document.getElementById("currentTotal").innerText = "Total: 0";
}

// Check answer
function checkAnswer() {
    updateHistory(target, total);

    const result = document.getElementById("resultText");

    if (Math.abs(total - target) < 0.01) {
        result.innerText = "✅ Correct!";
        result.style.color = "green";

        score++;
        streak++;

        // Update session best
        if (streak > sessionBest) {
            sessionBest = streak;
        }

        // Update all-time best
        if (streak > allTimeBest) {
            allTimeBest = streak;
            localStorage.setItem("bestStreak", allTimeBest);
        }

        setTimeout(startGame2, 1000);

    } else {
        result.innerText = "❌ Wrong! Score reset!";
        result.style.color = "red";

        score = 0;
        streak = 0;
    }

    // Update UI
    document.getElementById("score").innerText = score;
    document.getElementById("sessionBest").innerText = sessionBest;
    document.getElementById("allTimeBest").innerText = allTimeBest;
}
    
function formatDKK(value) {
    return value.toFixed(2).replace(".", ",") + " kr";
}

// History Array
let history = [];

// Toggle History Panel
function toggleHistory() {
    const panel = document.getElementById("historyPanel");
    panel.style.display = panel.style.display === "none" ? "block" : "none";
}

// Clear History button functionality
document.getElementById("clearHistoryButton").addEventListener("click", () => {
    history = []; // empty history array
    document.getElementById("historyList").innerHTML = ""; // clear panel
});

// Update history
function updateHistory(target, entered) {
    history.push({ target: target, entered: entered });
    const list = document.getElementById("historyList");
    list.innerHTML = ""; // Clear current list

    // Show newest first
    history.slice().reverse().forEach(item => {
        const li = document.createElement("li");

        // Check if correct
        const correct = Math.abs(item.entered - item.target) < 0.01;
        const icon = correct ? "✅" : "❌";

        li.innerText = `${icon} Target: ${formatDKK(item.target)}, Entered: ${formatDKK(item.entered)}`;
        list.appendChild(li);
    });
}
    
// Initialize display
updateDisplay();
document.getElementById("sessionBest").innerText = sessionBest;
document.getElementById("allTimeBest").innerText = allTimeBest;

// Say the Number Game
let sayNumberTarget = 0;
let sayNumberStreak = 0;
let recognition;
let listening = false;

function startSayNumberGame() {
    sayNumberStreak = 0;
    document.getElementById("sayNumberStreak").innerText = sayNumberStreak;
    generateSayNumber();
    document.getElementById("sayNumberResult").innerText = "";
}

// Generate a number between 1-100
function generateSayNumber() {
    sayNumberTarget = Math.floor(Math.random() * 100) + 1;
    document.getElementById("sayNumberDisplay").innerText = sayNumberTarget;
}

// Map Danish spoken numbers to digits
function parseDanishNumber(text) {
    text = text.trim().toLowerCase();

    // Very basic mapping (can expand later)
    const numbers = {
        "nul":0,"en":1,"et":1,"to":2,"tre":3,"fire":4,"fem":5,
        "seks":6,"syv":7,"otte":8,"ni":9,"ti":10,
        "elleve":11,"tolv":12,"tretten":13,"fjorten":14,"femten":15,
        "seksten":16,"sytten":17,"atten":18,"nitten":19,"tyve":20
    };
    return numbers[text] !== undefined ? numbers[text] : NaN;
}

// Start/Stop microphone
document.getElementById("startMicBtn").onclick = function() {
    if (!('webkitSpeechRecognition' in window)) {
        alert("Din browser understøtter ikke talegenkendelse 😢. Prøv Chrome eller Edge.");
        return;
    }

    if (!recognition) {
        recognition = new webkitSpeechRecognition();
        recognition.lang = 'da-DK';
        recognition.continuous = true;
        recognition.interimResults = false;

        recognition.onresult = function(event) {
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    const spoken = event.results[i][0].transcript;  // this is the recognized speech
                    checkSayNumber(spoken);
                    console.log("You said:", spoken);  // <- use the same variable
                }
            }
        }

        recognition.onerror = function(event) {
            console.log("Error:", event.error);
        }
    }

    if (!listening) {
        recognition.start();
        listening = true;
        this.innerText = "Stop Listening";
    } else {
        recognition.stop();
        listening = false;
        this.innerText = "Start Listening";
    }
}

// Check if spoken number is correct
function checkSayNumber(spoken) {
    const resultEl = document.getElementById("sayNumberResult");
    const displayEl = document.getElementById("sayNumberDisplay");

    let num = parseFloat(spoken.replace(",", "."));

    if (isNaN(num)) {
        num = parseDanishNumber(spoken);
    }

    console.log("Recognized:", num, "Target:", sayNumberTarget);

    if (!isNaN(num) && Math.abs(num - sayNumberTarget) < 0.01) {
        resultEl.innerText = "✅ Correct!";
        resultEl.style.color = "green";

        sayNumberStreak++;
        document.getElementById("sayNumberStreak").innerText = sayNumberStreak;

        // 👇 CLEAR NUMBER (this is the new part)
        displayEl.innerText = "";

        // ⏳ Wait before next number
        setTimeout(() => {
            resultEl.innerText = "";
            generateSayNumber();
        }, 1200);

    } else {
        resultEl.innerText = "❌ Wrong! Prøv igen...";
        resultEl.style.color = "red";

        sayNumberStreak = 0;
        document.getElementById("sayNumberStreak").innerText = sayNumberStreak;
    }
}

// Start game when user clicks on it
function initSayNumber() {
    startSayNumberGame();
}

// Hook it when showing the game
function showGame(gameId){
    const menu = document.getElementById('menuWrapper');
    menu.style.opacity = 0;

    setTimeout(() => {
        menu.style.display = 'none';
        document.querySelectorAll('.game-screen').forEach(div => div.style.display = 'none');
        document.getElementById(gameId).style.display = 'block';

        // Call specific start functions
        if (gameId === "game2") startGame2();
        if (gameId === "sayNumber") initSayNumber();

    }, 500);
}
</script>

</body>
</html>
