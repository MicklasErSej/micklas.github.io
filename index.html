<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Random Number Generator</title>
</head>
<body style="text-align:center; margin-top:100px; font-family:Arial;">

    <h1>Random Number Generator</h1>

    <button onclick="generateNumber()" style="padding:15px; font-size:18px;">
        Generate Number
    </button>

    <div id="number" style="font-size:40px; margin-top:30px;"></div>

    <script>
function generateNumber() {
    let random = Math.random();
    let number;

    if (random < 0.5) {
        // 50% → 1–100
        number = Math.floor(Math.random() * 100) + 1;

    } else if (random < 0.9) {
        // 40% → 101–699
        number = Math.floor(Math.random() * 599) + 101;

    } else {
        // 10% → 700–1000
        number = Math.floor(Math.random() * 301) + 700;
    }

    document.getElementById("number").innerText = number;
}
</script>
